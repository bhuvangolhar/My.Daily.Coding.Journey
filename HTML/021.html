<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscript tag</title>
</head>
<body>
    <p>
        The chemical formula of water is H<sub>2</sub>O.
    </p>

    <div>
        Subscript text appears slightly below the normal text.
    </div>
</body>
</html>

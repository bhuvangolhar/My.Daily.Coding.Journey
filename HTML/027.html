<!-- HTML file: Quote tag -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote tag</title>
</head>
<body>
    <p>
        My teacher always says,
        <q>Practice makes progress.</q>
    </p>

    <div>
        The quote tag is used to represent a short quotation.
    </div>
</body>
</html>
